name: Backend Test Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

      - name: Done message
        if: success()
        run: echo "✅ Backend tests completed successfully!"

      - name: Failure message
        if: failure()
        run: echo "❌ Backend tests failed. Check logs above."
